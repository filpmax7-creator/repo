<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abu Al-Hassan Repo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        :root { 
            --bg: #f8f9fa; --card-bg: #ffffff; --text: #333; --sub-text: #666; 
            --shadow: rgba(0,0,0,0.05); --border: #f0f0f0; 
        }
        /* دعم الوضع الليلي التلقائي */
        @media (prefers-color-scheme: dark) {
            :root { 
                --bg: #121212; --card-bg: #1e1e1e; --text: #efefef; --sub-text: #aaa; 
                --shadow: rgba(0,0,0,0.3); --border: #333; 
            }
        }
        
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 20px; text-align: center; color: var(--text); transition: 0.3s; }
        .container { max-width: 500px; margin: auto; animation: fadeIn 0.8s ease-in; }
        
        .header { background: var(--card-bg); padding: 30px; border-radius: 25px; box-shadow: 0 10px 30px var(--shadow); margin-bottom: 20px; border: 1px solid var(--border); }
        .header img { width: 100px; height: 100px; border-radius: 22%; margin-bottom: 15px; transition: transform 0.3s; }
        .header img:hover { transform: scale(1.05) rotate(3deg); }

        .btn-group { display: flex; gap: 8px; justify-content: center; margin-top: 20px; flex-wrap: wrap; }
        .btn-mini { flex: 1; min-width: 100px; color: white; text-decoration: none; padding: 12px 5px; border-radius: 12px; font-weight: bold; font-size: 13px; display: flex; align-items: center; justify-content: center; gap: 5px; transition: 0.2s; }
        .btn-mini:active { transform: scale(0.9); }

        /* زر النسخ */
        .copy-btn { width: 100%; background: var(--card-bg); color: var(--text); border: 1px dashed var(--primary); padding: 10px; border-radius: 12px; margin-top: 15px; cursor: pointer; font-size: 13px; font-weight: bold; }

        .package-card { background: var(--card-bg); padding: 15px; border-radius: 18px; display: flex; flex-direction: column; margin-bottom: 12px; box-shadow: 0 2px 12px var(--shadow); border: 1px solid var(--border); text-align: right; }
        .pkg-header { display: flex; align-items: center; width: 100%; }
        .pkg-header img { width: 50px; height: 50px; border-radius: 12px; margin-left: 15px; }
        
        /* سجل التغييرات */
        .changelog { background: var(--bg); border-radius: 10px; padding: 10px; margin-top: 10px; font-size: 12px; color: var(--sub-text); border-right: 3px solid #007bff; }

        .social-links { display: flex; justify-content: center; gap: 20px; margin-top: 30px; }
        .social-links a { width: 45px; height: 45px; background: var(--card-bg); border-radius: 50%; display: flex; align-items: center; justify-content: center; text-decoration: none; box-shadow: 0 5px 15px var(--shadow); font-size: 20px; transition: 0.3s; color: var(--text); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container" id="main-content">
    <div class="header">
        <img src="icon.png" alt="Icon">
        <h1 id="repo-name">مستودع أبو الحسن</h1>
        <p id="repo-desc">أضف المستودع بضغطة زر</p>
        
        <div class="btn-group">
            <a href="sileo://source/https://filpmax7-creator.github.io/repo/" class="btn-mini" style="background:#2fbdff;"><i class="fas fa-plus-circle"></i> Sileo</a>
            <a href="zbra://sources/add/https://filpmax7-creator.github.io/repo/" class="btn-mini" style="background:#f99157;"><i class="fas fa-leaf"></i> Zebra</a>
        </div>

        <button class="copy-btn" id="copy-btn" onclick="copyRepo()">
            <i class="fas fa-copy"></i> <span id="copy-text">نسخ رابط السورس</span>
        </button>
    </div>

    <div class="section-title" id="title-packages" style="text-align: inherit; font-size: 16px; margin: 20px 5px 10px; font-weight: bold; color: var(--sub-text);">الأدوات (1)</div>
    
    <div class="package-card">
        <div class="pkg-header">
            <img src="icon.png">
            <div style="flex-grow:1;">
                <h3 style="margin:0; font-size:16px;">YTNoAds <span style="font-size:10px; background:#007bff; color:#white; padding:2px 6px; border-radius:5px; color:white;">1.0.0</span></h3>
                <p id="pkg-desc" style="margin:5px 0 0; font-size:13px; color: var(--sub-text);">إزالة إعلانات يوتيوب بشكل كامل</p>
            </div>
        </div>
        <div class="changelog">
            <strong>ما الجديد:</strong>
            <ul style="margin: 5px 0; padding-right: 20px;">
                <li>الإصدار الأول للأداة.</li>
                <li>دعم كافة إصدارات يوتيوب الحديثة.</li>
            </ul>
        </div>
    </div>

    <div class="social-links">
        <a href="https://x.com/abu_al_hassan"><i class="fab fa-x-twitter"></i></a>
        <a href="https://www.tiktok.com/@abu_al_hassan" style="color: #ff0050;"><i class="fab fa-tiktok"></i></a>
        <a href="https://github.com/filpmax7-creator"><i class="fab fa-github"></i></a>
    </div>
</div>

<script>
    // ترجمة تلقائية
    const userLang = navigator.language || navigator.userLanguage;
    if (!userLang.startsWith('ar')) {
        document.documentElement.dir = "ltr";
        document.getElementById('repo-name').innerText = "Abu Al-Hassan Repo";
        document.getElementById('repo-desc').innerText = "Add repo with one click";
        document.getElementById('copy-text').innerText = "Copy Repo URL";
        document.getElementById('title-packages').innerText = "Packages (1)";
        document.getElementById('pkg-desc').innerText = "Remove all YouTube ads";
    }

    // وظيفة النسخ
    function copyRepo() {
        const url = "https://filpmax7-creator.github.io/repo/";
        navigator.clipboard.writeText(url).then(() => {
            const btnText = document.getElementById('copy-text');
            const originalText = btnText.innerText;
            btnText.innerText = userLang.startsWith('ar') ? "تم النسخ!" : "Copied!";
            setTimeout(() => { btnText.innerText = originalText; }, 2000);
        });
    }
</script>

</body>
</html>
