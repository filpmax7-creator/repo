<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abu Al-Hassan Repo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        :root { 
            --bg: #f8f9fa; --card: #ffffff; --text: #333; --sub: #666; 
            --accent: #007bff; --border: #eee; --shadow: rgba(0,0,0,0.05);
        }
        /* كلاس الوضع الليلي الإجباري */
        .dark-mode { 
            --bg: #121212; --card: #1e1e1e; --text: #f5f5f5; --sub: #aaa; 
            --accent: #0a84ff; --border: #333; --shadow: rgba(0,0,0,0.3);
        }
        
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 20px; color: var(--text); transition: 0.4s; }
        .container { max-width: 500px; margin: auto; }

        /* تصميم زر التبديل */
        .theme-toggle { display: flex; justify-content: flex-end; margin-bottom: 10px; }
        .theme-toggle i { cursor: pointer; font-size: 22px; color: var(--accent); transition: 0.3s; }

        .header { background: var(--card); padding: 30px; border-radius: 28px; box-shadow: 0 10px 30px var(--shadow); border: 1px solid var(--border); text-align: center; }
        .header img { width: 90px; height: 90px; border-radius: 22%; margin-bottom: 15px; transition: 0.3s; }
        
        .btn-group { display: flex; gap: 10px; margin-top: 20px; }
        .btn { flex: 1; color: white; text-decoration: none; padding: 12px; border-radius: 14px; font-weight: bold; font-size: 14px; display: flex; align-items: center; justify-content: center; gap: 6px; }
        
        .copy-box { background: var(--bg); border: 1px dashed var(--accent); padding: 12px; border-radius: 14px; margin-top: 15px; cursor: pointer; font-size: 13px; font-weight: bold; text-align: center; }

        .package-card { background: var(--card); padding: 18px; border-radius: 22px; margin-top: 20px; border: 1px solid var(--border); box-shadow: 0 4px 15px var(--shadow); }
        .pkg-top { display: flex; align-items: center; text-align: right; }
        .pkg-top img { width: 50px; height: 50px; border-radius: 12px; margin-left: 15px; }
        .changelog { background: var(--bg); border-radius: 12px; padding: 12px; margin-top: 15px; font-size: 12px; text-align: right; border-right: 4px solid var(--accent); }
    </style>
</head>
<body>

<div class="container">
    <div class="theme-toggle">
        <i class="fas fa-moon" id="theme-icon" onclick="toggleTheme()"></i>
    </div>

    <div class="header">
        <img src="icon.png" alt="Icon">
        <h1 id="r-name">مستودع أبو الحسن</h1>
        <p id="r-desc" style="color:var(--sub)">أدوات احترافية بلمسة عربية</p>
        
        <div class="btn-group">
            <a href="sileo://source/https://filpmax7-creator.github.io/repo/" class="btn" style="background:#2fbdff;">Sileo</a>
            <a href="zbra://sources/add/https://filpmax7-creator.github.io/repo/" class="btn" style="background:#f99157;">Zebra</a>
        </div>

        <div class="copy-box" onclick="copyURL()">
            <span id="copy-text">نسخ رابط السورس</span>
        </div>
    </div>

    <div class="package-card">
        <div class="pkg-top">
            <img src="icon.png">
            <div style="flex-grow:1">
                <h3 style="margin:0;">YTNoAds <span style="font-size:10px; background:var(--accent); color:white; padding:2px 8px; border-radius:20px;">1.0.0</span></h3>
                <p id="p-desc" style="color:var(--sub); font-size:13px">إزالة إعلانات يوتيوب بشكل كامل</p>
            </div>
        </div>
        <div class="changelog">
            <strong id="ch-title">سجل التغييرات:</strong>
            <ul style="margin:8px 0 0; padding-right:18px; color:var(--sub)">
                <li>دعم كامل لـ iOS 15 & 16 & 17.</li>
                <li>تحديث واجهة الموقع.</li>
            </ul>
        </div>
    </div>
</div>

<script>
    // وظيفة تبديل الوضع
    function toggleTheme() {
        const body = document.body;
        const icon = document.getElementById('theme-icon');
        body.classList.toggle('dark-mode');
        
        if (body.classList.contains('dark-mode')) {
            icon.classList.replace('fa-moon', 'fa-sun');
            localStorage.setItem('theme', 'dark');
        } else {
            icon.classList.replace('fa-sun', 'fa-moon');
            localStorage.setItem('theme', 'light');
        }
    }

    // حفظ خيار المستخدم
    if (localStorage.getItem('theme') === 'dark') {
        document.body.classList.add('dark-mode');
        document.getElementById('theme-icon').classList.replace('fa-moon', 'fa-sun');
    }

    const isAr = (navigator.language || navigator.userLanguage).startsWith('ar');
    if (!isAr) {
        document.documentElement.dir = "ltr";
        document.getElementById('r-name').innerText = "Abu Al-Hassan Repo";
        document.getElementById('copy-text').innerText = "Copy URL";
    }

    function copyURL() {
        navigator.clipboard.writeText("https://filpmax7-creator.github.io/repo/").then(() => {
            const span = document.getElementById('copy-text');
            span.innerText = isAr ? "تم النسخ!" : "Copied!";
            setTimeout(() => { span.innerText = isAr ? "نسخ رابط السورس" : "Copy URL"; }, 2000);
        });
    }
</script>

</body>
</html>
