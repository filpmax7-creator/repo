<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abu Al-Hassan Repo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        :root { 
            --bg: #f8f9fa; --card: #ffffff; --text: #333; --sub: #666; 
            --accent: #007bff; --border: #eee; --shadow: rgba(0,0,0,0.05);
        }
        @media (prefers-color-scheme: dark) {
            :root { 
                --bg: #121212; --card: #1e1e1e; --text: #f5f5f5; --sub: #aaa; 
                --accent: #0a84ff; --border: #333; --shadow: rgba(0,0,0,0.3);
            }
        }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 20px; color: var(--text); transition: 0.3s; line-height: 1.6; }
        .container { max-width: 500px; margin: auto; animation: slideUp 0.6s ease-out; }
        .header { background: var(--card); padding: 30px; border-radius: 28px; box-shadow: 0 10px 30px var(--shadow); border: 1px solid var(--border); text-align: center; }
        .header img { width: 90px; height: 90px; border-radius: 22%; margin-bottom: 15px; box-shadow: 0 5px 15px var(--shadow); transition: 0.3s; }
        .header img:hover { transform: scale(1.08) rotate(2deg); }
        h1 { margin: 10px 0; font-size: 24px; }
        .btn-group { display: flex; gap: 10px; margin-top: 20px; }
        .btn { flex: 1; color: white; text-decoration: none; padding: 12px; border-radius: 14px; font-weight: bold; font-size: 14px; display: flex; align-items: center; justify-content: center; gap: 6px; transition: 0.2s; }
        .btn:active { transform: scale(0.95); }
        .copy-box { background: var(--bg); border: 1px dashed var(--accent); padding: 12px; border-radius: 14px; margin-top: 15px; cursor: pointer; font-size: 13px; font-weight: bold; color: var(--text); transition: 0.2s; }
        .copy-box:hover { background: var(--border); }
        .package-card { background: var(--card); padding: 18px; border-radius: 22px; margin-top: 20px; border: 1px solid var(--border); box-shadow: 0 4px 15px var(--shadow); }
        .pkg-top { display: flex; align-items: center; text-align: right; }
        .pkg-top img { width: 50px; height: 50px; border-radius: 12px; margin-left: 15px; }
        .changelog { background: var(--bg); border-radius: 12px; padding: 12px; margin-top: 15px; font-size: 12px; text-align: right; border-right: 4px solid var(--accent); }
        .social { display: flex; justify-content: center; gap: 20px; margin-top: 30px; }
        .social a { color: var(--text); font-size: 22px; transition: 0.3s; }
        .social a:hover { color: var(--accent); transform: translateY(-3px); }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container" id="content">
    <div class="header">
        <img src="icon.png" alt="Repo Icon">
        <h1 id="r-name">مستودع أبو الحسن</h1>
        <p id="r-desc" style="color:var(--sub)">أدوات احترافية بلمسة عربية</p>
        
        <div class="btn-group">
            <a href="sileo://source/https://filpmax7-creator.github.io/repo/" class="btn" style="background:#2fbdff;"><i class="fas fa-plus"></i> Sileo</a>
            <a href="zbra://sources/add/https://filpmax7-creator.github.io/repo/" class="btn" style="background:#f99157;"><i class="fas fa-leaf"></i> Zebra</a>
        </div>

        <div class="copy-box" onclick="copyURL()">
            <i class="far fa-copy"></i> <span id="copy-text">نسخ رابط السورس</span>
        </div>
    </div>

    <div class="package-card">
        <div class="pkg-top">
            <img src="icon.png">
            <div style="flex-grow:1">
                <h3 style="margin:0; font-size:17px">YTNoAds <span style="font-size:10px; background:var(--accent); color:white; padding:2px 8px; border-radius:20px; vertical-align: middle; margin-right:5px;">1.0.0</span></h3>
                <p id="p-desc" style="margin:5px 0 0; color:var(--sub); font-size:13px">إزالة إعلانات يوتيوب بشكل كامل</p>
            </div>
        </div>
        <div class="changelog">
            <strong id="ch-title">سجل التغييرات:</strong>
            <ul style="margin:8px 0 0; padding-right:18px; color:var(--sub)">
                <li>الإصدار الأول الرسمي.</li>
                <li>دعم كامل لأحدث إصدارات YouTube.</li>
                <li>تحسين استهلاك البطارية.</li>
            </ul>
        </div>
    </div>

    <div class="social">
        <a href="https://x.com/abu_al_hassan"><i class="fab fa-x-twitter"></i></a>
        <a href="https://www.tiktok.com/@abu_al_hassan"><i class="fab fa-tiktok"></i></a>
        <a href="https://github.com/filpmax7-creator"><i class="fab fa-github"></i></a>
    </div>
</div>

<script>
    const isAr = (navigator.language || navigator.userLanguage).startsWith('ar');
    if (!isAr) {
        document.documentElement.dir = "ltr";
        document.getElementById('r-name').innerText = "Abu Al-Hassan Repo";
        document.getElementById('r-desc').innerText = "Professional Tools for your iOS";
        document.getElementById('copy-text').innerText = "Copy Repo URL";
        document.getElementById('p-desc').innerText = "Completely remove YouTube ads";
        document.getElementById('ch-title').innerText = "Changelog:";
    }

    function copyURL() {
        navigator.clipboard.writeText("https://filpmax7-creator.github.io/repo/").then(() => {
            const span = document.getElementById('copy-text');
            const old = span.innerText;
            span.innerText = isAr ? "تم النسخ بنجاح!" : "URL Copied!";
            setTimeout(() => { span.innerText = old; }, 2000);
        });
    }
</script>

</body>
</html>
