<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abu Al-Hassan Repo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        :root { --primary: #007bff; --bg: #f8f9fa; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); margin: 0; padding: 20px; text-align: center; color: #333; }
        .container { max-width: 500px; margin: auto; }
        .header { background: white; padding: 30px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .header img { width: 100px; height: 100px; border-radius: 22%; margin-bottom: 15px; object-fit: cover; border: 1px solid #eee; }
        .btn-add { display: block; background: var(--primary); color: white; text-decoration: none; padding: 16px; border-radius: 14px; font-weight: bold; margin-top: 15px; transition: 0.3s; font-size: 17px; }
        
        .section-title { text-align: right; font-size: 18px; margin: 25px 5px 12px; font-weight: bold; color: #555; }
        .package-card { background: white; padding: 15px; border-radius: 18px; display: flex; align-items: center; text-align: right; margin-bottom: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.04); border: 1px solid #f0f0f0; }
        .package-card img { width: 55px; height: 55px; border-radius: 12px; margin-left: 15px; }
        .package-info { flex-grow: 1; }
        .package-info h3 { margin: 0; font-size: 16px; color: #222; }
        .package-info p { margin: 5px 0 0; font-size: 13px; color: #888; line-height: 1.4; }

        .social-links { display: flex; justify-content: center; gap: 20px; margin-top: 30px; padding-bottom: 30px; }
        .social-links a { width: 50px; height: 50px; background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; text-decoration: none; box-shadow: 0 5px 15px rgba(0,0,0,0.08); font-size: 22px; transition: 0.3s; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <img src="icon.png" alt="Repo Icon">
        <h1>مستودع أبو الحسن</h1>
        <p>مرحباً بك في المستودع الخاص بي لأدوات الجيلبريك</p>
        <a href="sileo://source/https://filpmax7-creator.github.io/repo/" class="btn-add">
            <i class="fas fa-plus-circle"></i> إضافة إلى Sileo
        </a>
    </div>

    <div class="section-title">الأدوات المتوفرة</div>
    <div class="package-card">
        <img src="icon.png" alt="YTNoAds">
        <div class="package-info">
            <h3>YTNoAds</h3>
            <p>أداة احترافية لإزالة إعلانات يوتيوب بالكامل</p>
        </div>
        <i class="fas fa-chevron-left" style="color: #ddd; font-size: 12px;"></i>
    </div>

    <div class="section-title">تواصل معي</div>
    <div class="social-links">
        <a href="https://x.com/abu_al_hassan" style="color: #000;"><i class="fab fa-x-twitter"></i></a>
        <a href="https://www.tiktok.com/@abu_al_hassan" style="color: #ff0050;"><i class="fab fa-tiktok"></i></a>
        <a href="https://github.com/filpmax7-creator" style="color: #333;"><i class="fab fa-github"></i></a>
    </div>
</div>

</body>
</html>
